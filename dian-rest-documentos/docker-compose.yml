version: '3.8'

services:
  # Aplicación FastAPI
  dian-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dian-rest-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Montar carpeta de descargas para persistencia
      - ./descargas:/app/descargas
      # Opcional: montar logs si los hay
      # - ./logs:/app/logs
    env_file:
      - .env
    environment:
      # Sobrescribir solo la ruta de descargas para Docker
      DOWNLOAD_BASE_FOLDER: "/app/descargas"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Aumentar memoria compartida para Chromium
    shm_size: '2gb'
    # Capacidades de seguridad necesarias para navegadores
    cap_add:
      - SYS_ADMIN
    networks:
      - dian-network

networks:
  dian-network:
    driver: bridge
