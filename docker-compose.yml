version: "3.8"

services:
  # =============================================
  # FastAPI Backend
  # =============================================
  dian-api:
    build:
      context: ./dian-rest-documentos
      dockerfile: Dockerfile
    container_name: dian-rest-api
    restart: unless-stopped
    ports:
      - "4001:8000"
    volumes:
      - ./dian-rest-documentos/descargas:/app/descargas
    env_file:
      - ./dian-rest-documentos/.env
    environment:
      DOWNLOAD_BASE_FOLDER: "/app/descargas"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    networks:
      - dian-network

  # =============================================
  # Next.js Frontend
  # =============================================
  dian-frontend:
    build:
      context: ./dian-frontend
      dockerfile: Dockerfile
    container_name: dian-frontend
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://64.23.180.56:4001"
    depends_on:
      dian-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - dian-network

networks:
  dian-network:
    driver: bridge
